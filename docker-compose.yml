services:
  proxmox-view:
    build: .
    container_name: proxmox-view
    restart: unless-stopped
    ports:
      - "2545:2545"
    environment:
      - PROXMOX_HOST=${PROXMOX_HOST}
      - PROXMOX_TOKEN_ID=${PROXMOX_TOKEN_ID}
      - PROXMOX_TOKEN_SECRET=${PROXMOX_TOKEN_SECRET}
      - PROXMOX_HOSTS=${PROXMOX_HOSTS:-}
      - PBS_HOST=${PBS_HOST:-}
      - PBS_TOKEN_ID=${PBS_TOKEN_ID:-}
      - PBS_TOKEN_SECRET=${PBS_TOKEN_SECRET:-}
      - PORT=${PORT:-2545}
      - REFRESH_INTERVAL=${REFRESH_INTERVAL:-30000}
      - GOTIFY_URL=${GOTIFY_URL:-}
      - GOTIFY_TOKEN=${GOTIFY_TOKEN:-}
      - NOTIFY_INTERVAL=${NOTIFY_INTERVAL:-60000}
      - NOTIFY_COOLDOWN=${NOTIFY_COOLDOWN:-900000}
      - CPU_SUSTAIN_MINUTES=${CPU_SUSTAIN_MINUTES:-60}
